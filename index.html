<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score</title>

  <style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body {
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top, #2d006b, #05010f);

  font-family: 'Orbitron', sans-serif;

  color: white;
}

.box {
  width: 400px;

  background: rgba(20, 10, 40, 0.7);

  border: 2px solid #bb66ff;

  border-radius: 25px;

  padding: 40px;

  text-align: center;

  box-shadow:
    0 0 20px #a020f0,
    0 0 40px #7a00ff;

  backdrop-filter: blur(10px);
}

h1 {
  font-size: 40px;

  color: #e0b3ff;

  text-shadow:
    0 0 10px #d580ff,
    0 0 20px #b84dff;

  margin-bottom: 30px;
}

p {
  color: #d8b4ff;
  margin-bottom: 20px;
}

input {
  width: 80%;

  padding: 15px;

  border: 2px solid #bb66ff;

  border-radius: 12px;

  background: #120022;

  color: white;

  font-size: 20px;

  font-family: 'Orbitron', sans-serif;

  outline: none;

  box-shadow: 0 0 15px #8a2be2;
}

button {
  margin-top: 25px;

  padding: 15px 30px;

  border: none;

  border-radius: 15px;

  background:
    linear-gradient(90deg, #8a2be2, #d633ff);

  color: white;

  font-size: 18px;

  font-family: 'Orbitron', sans-serif;

  cursor: pointer;

  box-shadow:
    0 0 15px #c44dff,
    0 0 30px #7a00ff;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);

  box-shadow:
    0 0 25px #e066ff,
    0 0 50px #b300ff;
}

#result {
  margin-top: 30px;

  font-size: 22px;

  color: #f0c3ff;

  text-shadow: 0 0 10px #d966ff;
}

</style>

</head>

<body>

  <div class="box">
   <h1>SURVEY RESULT</h1>

<p>ENTER YOUR TOTAL SCORE</p>

<input type="number" id="score">

<button onclick="showResult()">
VIEW RESULT
</button>

<div id="result"></div>
    
  <script>
    function showResult() {

      let score = Number(document.getElementById("score").value);

      let result = "";

      if (score <= 20) {
        result = "당신은 A 유형입니다!";
      }

      else if (score <= 40) {
        result = "당신은 B 유형입니다!";
      }

      else {
        result = "당신은 C 유형입니다!";
      }

      document.getElementById("result").innerText = result;
    }
  </script>

</body>
</html>
