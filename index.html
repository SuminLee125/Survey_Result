<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score</title>

  <style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body {
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top, #2d006b, #05010f);

  font-family: 'Orbitron', sans-serif;

  color: white;
}

.box {
  width: 550px;

  background: rgba(20, 10, 40, 0.7);

  border: 2px solid #bb66ff;

  border-radius: 25px;

  padding: 40px;

  text-align: center;

  box-shadow:
    0 0 20px #a020f0,
    0 0 40px #7a00ff;

  backdrop-filter: blur(10px);
}

h1 {
  font-size: 40px;

  color: #e0b3ff;

  text-shadow:
    0 0 10px #d580ff,
    0 0 20px #b84dff;

  margin-bottom: 30px;
}

p {
  color: #d8b4ff;
  margin-bottom: 20px;
}

input {
  width: 80%;

  padding: 15px;

  border: 2px solid #bb66ff;

  border-radius: 12px;

  background: #120022;

  color: white;

  font-size: 20px;

  font-family: 'Orbitron', sans-serif;

  outline: none;

  box-shadow: 0 0 15px #8a2be2;
}

button {
  margin-top: 25px;

  padding: 15px 30px;

  border: none;

  border-radius: 15px;

  background:
    linear-gradient(90deg, #8a2be2, #d633ff);

  color: white;

  font-size: 18px;

  font-family: 'Orbitron', sans-serif;

  cursor: pointer;

  box-shadow:
    0 0 15px #c44dff,
    0 0 30px #7a00ff;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);

  box-shadow:
    0 0 25px #e066ff,
    0 0 50px #b300ff;
}

#result {
  margin-top: 30px;

  font-size: 22px;

  color: #f0c3ff;

  text-shadow: 0 0 10px #d966ff;
}

</style>

</head>

<body>

  <div class="box">
   <h1>SURVEY RESULT</h1>

<p>ENTER YOUR TOTAL SCORE</p>

<input type="number" id="score">

<button onclick="showResult()">
VIEW RESULT
</button>

<div id="result"></div>
    
 <script>
function showResult() {

  if (document.getElementById("score").value === "") {
    document.getElementById("result").innerHTML =
      "점수를 입력해주세요.";
    return;
  }

  let score = Number(document.getElementById("score").value);

  let result = "";
  let advice = "";

  if (score <= 39) {

    result = "당신의 AI 의존·취약성 지수는 매우 낮음 단계입니다.";

    advice = `
    <br><br>
    현재 AI를 건강하게 활용하고 있습니다.
    앞으로도 현실 세계의 인간관계를 꾸준히 유지해 보세요.

    <ol>
      <li>캠페인에 참여하여 AI를 건강하게 활용하는 다른 방법 알아보기</li>
    </ol>
    `;
  }

    else if (score <= 50) {

    result = "당신의 AI 의존·취약성 지수는 낮음 단계입니다.";

    advice = `
    <br><br>
    AI를 적절하게 활용하는 편입니다.
    사용 습관을 점검하고 발전하여 취약성 지수를 더 낮게 만들어보세요.
    <ol>
      <li>주 1일 이상 디지털 디톡스 시간 시도해보기</li>
      <li>AI 사용 시간 기록하며 유지하기</li>
      <li>AI 알고리즘 점검하기</li>
    </ol>
    `;
  }
      
  else if (score <= 54) {

    result = "당신의 AI 의존·취약성 지수는 보통 단계입니다.";

    advice = `
    <br><br>
    AI 활용이 늘어나고 있을 수 있습니다.
    AI와의 상호작용뿐 아니라 주변 사람들과의 소통도 꾸준히 유지하는 것이 좋습니다.
    아래 미션을 수행해 보세요.

    <ol>
      <li>주 3일 이상, 한 명 이상의 사람들과 함께하는 활동에 참여하기</li>
      <li>주 2일 이상, 자기 감정 성찰 일기 작성하기</li>
      <li>주 1일 이상, 디지털 디톡스 시도해보기</li>
      <li>주 1번 이상, 노트에 신문기사, 뉴스 등을 읽으며 내용을 정리하고 비판적 코멘트 작성하기</li>
    </ol>
    `;
  }

  else if (score <= 60) {

    result = "당신의 AI 의존·취약성 지수는 높음 단계입니다.";

    advice = `
    <br><br>
    AI에 대한 정서적 의존이 나타날 수 있습니다.
    오프라인 활동과 실제 인간관계를 늘려보는 것을 권장합니다.

    <ol>
      <li>하루 AI 사용 시간과 용도를 기록하며, 점차 줄여보도록 노력하기</li>
      <li>주 3일 이상, 한 명 이상의 사람들과 함께하는 활동에 참여하기</li>
      <li>주 3일 이상, 자기 감정 성찰 일기 작성하기</li>
      <li>주 2번 이상, 30분 이상 독서하며 내용을 정리하고 느낀 점 작성하기</li>
    </ol>
    `;
  }

  else {

    result = "당신의 AI 의존·취약성 지수는 매우 높음 단계입니다.";

    advice = `
    <br><br>
    AI가 주요 정서적 지지 수단이 되고 있을 수 있습니다.
    주변 사람들과의 연결을 의식적으로 늘려보세요.

    <ol>
      <li>하루 AI 사용 시간 제한 설정하기, 용도를 기록하기</li>
      <li>매일 가족 또는 친구와 10분 이상 대화하며, 오프라인 활동에 참여하기</li>
      <li>매일 간단하게라도 자기 감정 성찰 일기 작성하기</li>
      <li>필요 시 상담센터 또는 전문가 도움 알아보기</li>
    </ol>
    `;
  }

  document.getElementById("result").innerHTML =
    result + advice;
}
</script>    
    
</body>
</html>
