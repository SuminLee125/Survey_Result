<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설문 결과</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background-color: #f4f4f4;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 80%;
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>설문 결과 확인</h1>

    <p>총 점수를 입력하세요</p>

    <input type="number" id="score">

    <br>

    <button onclick="showResult()">결과 보기</button>

    <div id="result"></div>
  </div>

  <script>
    function showResult() {

      let score = Number(document.getElementById("score").value);

      let result = "";

      if (score <= 20) {
        result = "당신은 A 유형입니다!";
      }

      else if (score <= 40) {
        result = "당신은 B 유형입니다!";
      }

      else {
        result = "당신은 C 유형입니다!";
      }

      document.getElementById("result").innerText = result;
    }
  </script>

</body>
</html>
